name: '📦 حرفه‌ای: دانلود و ذخیره در مخزن'

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: '🔗 لینک مستقیم فایل'
        required: true
        type: string
      password:
        description: '🔐 رمز فایل فشرده (اختیاری)'
        required: false
        type: string
        default: ''
      split_size:
        description: '📦 حجم هر تکه (پیش‌فرض: 95m) مثال: 95m, 100m, 200m'
        required: false
        type: string
        default: '95m'

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: 🔄 دریافت کد مخزن
        uses: actions/checkout@v4

      - name: ⚙️ نصب ابزارها
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full file

      - name: 📥 دانلود فایل
        id: download
        run: |
          URL="${{ github.event.inputs.file_url }}"
          echo "در حال دانلود از: $URL"
          curl -L --fail --retry 5 --retry-delay 5 --progress-bar -o downloaded_file "$URL"
          if [ $? -ne 0 ]; then exit 1; fi
          ls -lh downloaded_file

      - name: 🧠 تشخیص نوع و استخراج نام اصلی
        id: classify
        run: |
          # نام اصلی از لینک (بدون پارامترها)
          RAW_NAME=$(basename "${{ github.event.inputs.file_url }}" | sed 's/\?.*//' | sed 's/%20/ /g')
          if [ -z "$RAW_NAME" ]; then RAW_NAME="unknown_file"; fi
          
          # جدا کردن نام پایه (بدون پسوند) برای پوشه
          BASENAME_NOEXT="${RAW_NAME%.*}"
          if [ "$BASENAME_NOEXT" = "$RAW_NAME" ]; then
            # فایل بدون پسوند
            BASENAME_NOEXT="$RAW_NAME"
          fi
          # نام امن برای پوشه (جایگزینی کاراکترهای غیرمجاز با _)
          FOLDER_NAME=$(echo "$BASENAME_NOEXT" | sed 's/[\\/:*?"<>|]/_/g')
          if [ -z "$FOLDER_NAME" ]; then FOLDER_NAME="downloaded_file"; fi
          
          # نام امن برای فایل درون آرشیو (با پسوند)
          ORIGINAL_FILENAME=$(echo "$RAW_NAME" | sed 's/[\\/:*?"<>|]/_/g')
          
          # تشخیص MIME و دسته‌بندی
          MIME=$(file -b --mime-type downloaded_file)
          EXT="${RAW_NAME##*.}"
          EXT=$(echo "$EXT" | tr '[:upper:]' '[:lower:]')
          
          if [[ "$MIME" == video/* ]] || [[ "$EXT" =~ ^(mp4|mkv|avi|mov|wmv|flv|webm)$ ]]; then
            CAT="video"
          elif [[ "$MIME" == audio/* ]] || [[ "$EXT" =~ ^(mp3|wav|ogg|flac|m4a)$ ]]; then
            CAT="audio"
          elif [[ "$MIME" == image/* ]] || [[ "$EXT" =~ ^(jpg|jpeg|png|gif|bmp|webp)$ ]]; then
            CAT="image"
          elif [[ "$MIME" == application/pdf ]] || [[ "$EXT" =~ ^(pdf|doc|docx|xls|xlsx|ppt|pptx|txt)$ ]]; then
            CAT="document"
          else
            CAT="other"
          fi
          
          echo "CAT=$CAT" >> $GITHUB_ENV
          echo "FOLDER_NAME=$FOLDER_NAME" >> $GITHUB_ENV
          echo "ORIGINAL_FILENAME=$ORIGINAL_FILENAME" >> $GITHUB_ENV
          echo "✅ دسته: $CAT → زیرپوشه: $FOLDER_NAME"
          echo "📄 نام اصلی فایل: $ORIGINAL_FILENAME"

      - name: 🔄 تغییر نام فایل به نام اصلی
        run: |
          mv downloaded_file "${{ env.ORIGINAL_FILENAME }}"
          echo "فایل به نام ${{ env.ORIGINAL_FILENAME }} تغییر نام یافت"
          ls -lh "${{ env.ORIGINAL_FILENAME }}"

      - name: 🗜️ فشرده‌سازی و تقسیم (با اعمال رمز)
        run: |
          FINAL_DIR="downloads/${{ env.CAT }}/${{ env.FOLDER_NAME }}"
          mkdir -p "$FINAL_DIR"
          
          rm -f "$FINAL_DIR"/*.7z*
          
          if [ -z "${{ github.event.inputs.password }}" ]; then
            7z a -mhe=on -mx=3 -v${{ github.event.inputs.split_size }} "$FINAL_DIR/archive.7z" "./${{ env.ORIGINAL_FILENAME }}"
          else
            7z a -p"${{ github.event.inputs.password }}" -mhe=on -mx=3 -v${{ github.event.inputs.split_size }} "$FINAL_DIR/archive.7z" "./${{ env.ORIGINAL_FILENAME }}"
          fi
          
          echo "✅ پوشه: $FINAL_DIR"
          echo "✅ فایل درون آرشیو: ${{ env.ORIGINAL_FILENAME }}"
          ls -lh "$FINAL_DIR"

      - name: 📝 کامیت و پوش به مخزن
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "Add downloaded file: ${{ env.ORIGINAL_FILENAME }} (category: ${{ env.CAT }})" || echo "Nothing to commit"
          git push
